name: taxi_app
description: Приложение такси с картами и реальным временем

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP-клиент для работы с REST API
  http: ^1.1.0

  # Google Maps Flutter (спутниковый режим)
  google_maps_flutter: ^2.5.0

  # Socket.io клиент для real-time обновлений
  socket_io_client: ^3.1.4

  # Firebase Cloud Messaging для push-уведомлений
  firebase_core: ^4.5.0
  firebase_messaging: ^16.1.2

  # Локальное хранилище (JWT токен, данные пользователя)
  shared_preferences: ^2.2.2

  # Управление состоянием
  provider: ^6.1.1

  # Форматирование дат
  intl: 0.20.2

  # Текущая GPS-позиция пользователя (центровка карты)
  geolocator: ^13.0.0

  # Иконки Material
  cupertino_icons: ^1.0.2

  # Выбор фото и видео из галереи / камеры
  image_picker: ^1.0.7

  # Определение MIME-типа файла по расширению
  mime: ^1.0.4

  # Временная директория для скачивания APK обновления
  path_provider: ^2.1.2

  # Кеширование изображений
  cached_network_image: ^3.3.1

  # Воспроизведение и кеширование видео
  video_player: ^2.8.6
  flutter_cache_manager: ^3.3.1
  record: ^5.2.1
  audioplayers: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "../icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
