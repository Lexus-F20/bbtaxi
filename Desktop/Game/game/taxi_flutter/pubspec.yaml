name: taxi_app
description: Приложение такси с картами и реальным временем

publish_to: 'none'

version: 1.0.15

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  http: ^1.1.0
  google_maps_flutter: ^2.5.0
  socket_io_client: ^3.1.4
  firebase_core: ^4.5.0
  firebase_messaging: ^16.1.2
  shared_preferences: ^2.2.2
  provider: ^6.1.1
  intl: 0.20.2
  geolocator: ^13.0.0
  cupertino_icons: ^1.0.2
  image_picker: ^1.0.7
  mime: ^1.0.4
  path_provider: ^2.1.2
  cached_network_image: ^3.3.1
  video_player: ^2.8.6
  flutter_cache_manager: ^3.3.1
  record: ^5.2.1
  audioplayers: ^6.1.0
  crypto: ^3.0.3
  video_compress: ^3.1.2

dependency_overrides:
  record_linux: ^1.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "../icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true